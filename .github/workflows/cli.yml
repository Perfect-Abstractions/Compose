name: CLI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Lint
        run: npm run lint

  smoke-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    needs: lint
    env:
      FOUNDRY_PROFILE: ci
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Smoke test Foundry counter base
        run: |
          set -euo pipefail
          rm -rf ci-foundry
          node dist/index.js init ci-foundry \
            --framework foundry \
            --base counter \
            --ownership owner \
            --yes \
            --no-install-deps
          cd ci-foundry
          forge build

      - name: Smoke test Hardhat counter base (ethers)
        run: |
          set -euo pipefail
          rm -rf ci-hardhat
          node dist/index.js init ci-hardhat \
            --framework hardhat \
            --toolbox ethers \
            --base counter \
            --ownership owner \
            --yes \
            --no-install-deps
          cd ci-hardhat
          npx hardhat compile

  pack-verify:
    runs-on: ubuntu-latest
    needs:
      - lint
      - smoke-tests
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify npm pack output
        run: npm run pack:check
